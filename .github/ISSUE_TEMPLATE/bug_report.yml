name: Bug Report
description: Report a reproducible bug in Stellar-K8s
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        > **Security vulnerability?** Use [GitHub Security Advisories](../../security/advisories/new) — do **not** open a public issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Apply manifest ...
        2. Run command ...
        3. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Paste relevant logs or attach screenshots. Logs are auto-formatted.
      render: shell

  - type: markdown
    attributes:
      value: "### Environment"

  - type: input
    id: stellar-version
    attributes:
      label: Stellar-K8s Version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes Version
      placeholder: "e.g. 1.30.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 22.04, macOS 14, Windows 11"
    validations:
      required: true
