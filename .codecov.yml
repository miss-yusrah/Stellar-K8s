coverage:
  precision: 2
  round: down
  range: "70...100"

ignore:
  - "tests"
  - "benches"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  show_carryforward_flags: false

flags:
  unittests:
    carryforward: true
